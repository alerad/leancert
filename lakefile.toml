name = "LeanCert"
version = "0.1.0"
defaultTargets = ["leancert"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "81a5d257c8e410db227a6665ed08f64fea08e997"

[[lean_lib]]
name = "LeanCert"
precompileModules = false
# Note: LeanCert.Examples.Li2Bounds is the lightweight li(2) interface for
# downstream projects (builds in seconds; its two bound statements are
# intentionally `sorry` — see the file docstring). The machine-checked proofs
# live in the Li2Verified target (under a minute of native_decide interval
# arithmetic on a typical development machine), built in LeanCert CI, which
# ends with a statement-identity check against the interface.

# Examples and tests - not part of default build
# Build with: lake build examples
[[lean_lib]]
name = "examples"
roots = ["LeanCert.Examples"]
precompileModules = false

# Heavy numerical verification - for CI validation. Proves the bounds stated
# (with `sorry`) in the Li2Bounds interface and statement-identity-checks them.
# Build explicitly with: lake build Li2Verified
[[lean_lib]]
name = "Li2Verified"
roots = ["LeanCert.Examples.Li2Verified"]
precompileModules = false

# Heavy BKLNW a2 bounds verification - for CI validation.
# BKLNW_a2_pow2 and BKLNW_a2_bounds are the stable re-export interfaces
# imported by PrimeNumberTheoremAnd; they are roots here so CI keeps them
# building (they bitrotted once while unwired from any target).
# Build explicitly with: lake build BKLNW_a2_reflective
[[lean_lib]]
name = "BKLNW_a2_reflective"
roots = [
  "LeanCert.Examples.BKLNW_a2_reflective",
  "LeanCert.Examples.BKLNW_a2_pow2",
  "LeanCert.Examples.BKLNW_a2_bounds",
]
precompileModules = false

# Downstream interface guard: imports every LeanCert module referenced by
# PrimeNumberTheoremAnd and #check-pins every declaration it uses by name.
# Removing or renaming any of them must fail CI here, not in the downstream
# project's CI after a release. See LeanCert/Test/DownstreamInterface.lean.
[[lean_lib]]
name = "DownstreamInterface"
roots = ["LeanCert.Test.DownstreamInterface"]
precompileModules = false

# Downstream behavioral guard: compiles representative proof patterns copied
# from PrimeNumberTheoremAnd. This complements the name-only interface guard.
# Build explicitly with: lake build DownstreamPatterns
[[lean_lib]]
name = "DownstreamPatterns"
roots = [
  "LeanCert.Test.DownstreamPatterns",
  "LeanCert.Test.DownstreamPatterns.Tactics",
  "LeanCert.Test.DownstreamPatterns.BKLNW",
  "LeanCert.Test.DownstreamPatterns.Chebyshev",
  "LeanCert.Test.DownstreamPatterns.PNTCompilers",
  "LeanCert.Test.DownstreamPatterns.Table4Ext",
  "LeanCert.Test.DownstreamPatterns.Li2",
]
precompileModules = false

# Chebyshev psi smoke test (native_decide)
# Build explicitly with: lake build ChebyshevPsiTest
[[lean_lib]]
name = "ChebyshevPsiTest"
roots = ["LeanCert.Test.ChebyshevPsi"]
precompileModules = false

# Chebyshev theta smoke test (native_decide)
# Build explicitly with: lake build ChebyshevThetaTest
[[lean_lib]]
name = "ChebyshevThetaTest"
roots = ["LeanCert.Test.ChebyshevTheta"]
precompileModules = false

# Generic table certificate smoke test
# Build explicitly with: lake build TableTest
[[lean_lib]]
name = "TableTest"
roots = ["Tests.Table"]
precompileModules = false

# Hardening regression smoke test
# Build explicitly with: lake build HardeningTest
[[lean_lib]]
name = "HardeningTest"
roots = ["LeanCert.Test.Hardening"]
precompileModules = false

# Full functional/regression test suite (everything under LeanCert/Test
# except benchmarks). Build with: lake build FunctionalTests
# Each test is its own root (built in its own process); a test module not
# listed here is dead code — add new tests to this list.
[[lean_lib]]
name = "FunctionalTests"
roots = [
  "LeanCert.Test.AffineCoverTest",
  "LeanCert.Test.AsympCheckers",
  "LeanCert.Test.AsympEnv",
  "LeanCert.Test.AsympTransforms",
  "LeanCert.Test.BridgeTest",
  "LeanCert.Test.ChebyshevPsi",
  "LeanCert.Test.ChebyshevTheta",
  "LeanCert.Test.EulerMascheroni",
  "LeanCert.Test.FinSumBound",
  "LeanCert.Test.FinSumExpandTest",
  "LeanCert.Test.Hardening",
  "LeanCert.Test.IntegrationDyadicChecked",
  "LeanCert.Test.Krawczyk",
  "LeanCert.Test.Numeral",
  "LeanCert.Test.Pisano",
  "LeanCert.Test.PublicEvalAPI",
  "LeanCert.Test.ReadmeTest",
  "LeanCert.Test.ReleaseTest",
  "LeanCert.Test.SqrtTest",
  "LeanCert.Test.Support",
  "LeanCert.Test.TestDyadicEval",
  "LeanCert.Test.TestPhase3",
  "LeanCert.Test.TransformerTest",
  "LeanCert.Test.TrigReduction",
  "LeanCert.Test.ValidityExports",
  "LeanCert.Test.VecSimpTest",
  "LeanCert.Test.WitnessSum",
  "LeanCert.Test.test_ceil",
  "LeanCert.Test.test_discovery_polish",
  "LeanCert.Test.test_edge_bound_forms",
  "LeanCert.Test.test_edge_bounds",
  "LeanCert.Test.test_edge_decide_fast",
  "LeanCert.Test.test_edge_discovery_forms",
  "LeanCert.Test.test_edge_discovery_seticc",
  "LeanCert.Test.test_edge_mv",
  "LeanCert.Test.test_edge_mv_forms",
  "LeanCert.Test.test_edge_refute",
  "LeanCert.Test.test_exp_bound",
  "LeanCert.Test.test_exp_bounds",
  "LeanCert.Test.test_exp_fail",
  "LeanCert.Test.test_log",
  "LeanCert.Test.test_multivar",
  "LeanCert.Test.test_reify_reflect",
  "LeanCert.Test.test_stress_intervalrat",
  "LeanCert.Test.test_stress_multivar",
  "LeanCert.Test.test_stress_root",
  "LeanCert.Test.test_stress_subdiv",
  "LeanCert.Test.test_stress_univariate",
  "LeanCert.Test.test_subdiv",
  "LeanCert.Test.test_subdiv_lower",
  "LeanCert.Test.test_subdiv_strict",
  "LeanCert.Test.test_unique_root_fix",
]
precompileModules = false

# Manual-run performance benchmarks. Build with: lake build Benchmarks
# (Listed as separate roots: several define their own `main` and cannot be
# imported into a single environment.)
[[lean_lib]]
name = "Benchmarks"
roots = [
  "LeanCert.Test.BenchmarkAffine",
  "LeanCert.Test.BenchmarkBackends",
  "LeanCert.Test.ExtremeBenchmark",
  "LeanCert.Test.IntensiveBenchmark",
  "LeanCert.Test.TestDyadicIntegration",
  "LeanCert.Test.TimingBenchmark",
]
precompileModules = false

[[lean_exe]]
name = "leancert"
root = "Main"

[[lean_exe]]
name = "lean_bridge"
root = "LeanCert.Bridge"

[[lean_exe]]
name = "check-compat"
root = "LeanCert.CheckCompat"

[[lean_exe]]
name = "leancert-bench"
root = "LeanCert.Benchmark.Main"
