site_name: LeanCert
site_description: Certified numerical computation and bound verification for Lean 4.
site_url: https://docs.leancert.io
repo_url: https://github.com/alerad/leancert
repo_name: alerad/leancert

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - tables

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Tactics:
    - Choosing Tactics: tactics/choosing-tactics.md
    - Reference: tactics/tactics.md
    - Discovery Mode: tactics/discovery.md
    - Troubleshooting: tactics/troubleshooting.md
    - End-to-End Example: tactics/end-to-end-example.md
    - Root Finding: architecture/root-finding.md
  - Certificate APIs:
    - Overview: certificates/overview.md
    - Chebyshev: certificates/chebyshev.md
    - ANT Finite Bridges: certificates/ant.md
    - Asymptotic Envelopes: certificates/ant-asymp.md
    - QProduct: certificates/qproduct.md
  - Neural Networks:
    - Verification: ml/neural-networks.md
    - Distillation: ml/distillation.md
  - Architecture:
    - Golden Theorems: architecture/golden-theorems.md
    - Table Certificates: architecture/table-certificates.md
    - Verification Status: architecture/verification-status.md
