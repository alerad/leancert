site_name: LeanCert
site_description: Certified numerical computation and bound verification for Lean 4.
site_url: https://docs.leancert.io
repo_url: https://github.com/alerad/leancert
repo_name: alerad/leancert

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - tables

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: quickstart.md
    - Choosing A Proof Shape: choosing-proof-shape.md
  - Direct Automation:
    - Bounds and Inequalities: direct/bounds.md
    - Roots and No-Root Proofs: direct/roots.md
    - Optimization and Discovery: direct/optimization-discovery.md
    - Checked Automatic Differentiation: direct/checked-ad.md
    - Integration: direct/integration.md
    - Troubleshooting: direct/troubleshooting.md
    - Tactics Reference: direct/tactics-reference.md
  - Proof Templates:
    - Overview: proof-templates/overview.md
    - Checker-To-Theorem Pattern: proof-templates/checker-to-theorem.md
    - Table Certificates: proof-templates/table-certificates.md
    - Asymptotic Envelopes: proof-templates/asymptotic-envelopes.md
    - Pointwise Envelopes: proof-templates/pointwise-envelopes.md
    - ConstantFactory: proof-templates/constant-factory.md
    - Exact Product-Integral Certificates: proof-templates/qproduct-finite-integrals.md
    - Contour Shift: proof-templates/contour-shift.md
    - Directed Limits: proof-templates/directed-limits.md
    - Wall Quotients: proof-templates/wall-quotients.md
  - Domain Libraries:
    - Overview: domains/overview.md
    - Analytic Number Theory:
      - Overview: domains/ant/overview.md
      - Chebyshev: domains/ant/chebyshev.md
      - Finite ANT: domains/ant/finite-ant.md
      - ANT Asymptotic: domains/ant/asymptotic-ant.md
      - Explicit PNT: domains/ant/explicit-pnt.md
    - QProduct Prime Limits: domains/qproduct-prime-limits.md
    - Constants: domains/constants.md
  - ML Verification:
    - Verification: ml/neural-networks.md
    - Distillation: ml/distillation.md
  - Architecture and Trust:
    - Golden Theorems: architecture/golden-theorems.md
    - Interval Backend Selection: architecture/backend-selection.md
    - Table Certificates: architecture/table-certificates.md
    - Root Finding: architecture/root-finding.md
    - Verification Status: architecture/verification-status.md
    - Benchmark Harness: architecture/benchmarks.md
  - Reference:
    - Imports: reference/imports.md
    - Tactics: reference/tactics.md
    - Certificate APIs: reference/certificate-apis.md
    - Legacy Certificate Overview: certificates/overview.md
    - Legacy Tactics Reference: tactics/tactics.md
