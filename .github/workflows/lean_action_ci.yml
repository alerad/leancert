name: Lean Action CI

on:
  push:
    branches: ['**']  # All branches
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1

      - name: Build examples
        run: lake build examples

      - name: Build FunctionalTests (full regression suite)
        run: lake build FunctionalTests

      - name: Check every test module is wired into a Lake target
        run: python3 scripts/check_test_wiring.py

      - name: Test stable Mathlib update discovery
        run: python3 -m unittest discover -s scripts/tests -p 'test_mathlib_stable_update.py'

      - name: Build and smoke-test public executables
        run: python3 scripts/smoke_test_executables.py

      - name: Build Li2Verified (heavy numerical verification)
        run: lake build Li2Verified

      - name: Build BKLNW_a2_reflective (heavy a2 bounds verification)
        run: lake build BKLNW_a2_reflective

      - name: Build ChebyshevPsiTest (psi checker smoke test)
        run: lake build ChebyshevPsiTest

      - name: Build TableTest (table certificate smoke test)
        run: lake build TableTest

      - name: Build DownstreamInterface (PrimeNumberTheoremAnd-facing surface)
        run: lake build DownstreamInterface

      - name: Build DownstreamPatterns (PrimeNumberTheoremAnd proof shapes)
        run: lake build DownstreamPatterns
