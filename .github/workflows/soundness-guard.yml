name: Soundness Guard

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Guard - no user axioms in LeanCert
        run: |
          if find LeanCert -name '*.lean' -print0 | xargs -0 grep -nE '^[[:space:]]*axiom[[:space:]]+'; then
            echo "Found forbidden axiom declaration(s) in LeanCert/"
            exit 1
          fi

      - name: Guard - no non-allowlisted sorry in LeanCert
        run: |
          # Track only actual placeholder terms (not prose mentions).
          # Allowlist:
          # - LeanCert/Examples/** (intentional interface placeholders)
          # - LeanCert/Test/** (test-only)
          hits="$(find LeanCert \
            -path 'LeanCert/Examples' -prune -o \
            -path 'LeanCert/Test' -prune -o \
            -name '*.lean' -print0 | xargs -0 grep -nE '^[[:space:]]*sorry[[:space:]]*$' || true)"
          if [ -n "$hits" ]; then
            echo "Found non-allowlisted sorry placeholder(s):"
            echo "$hits"
            exit 1
          fi

      - name: Guard - no synthetic proof holes in LeanCert
        run: |
          hits="$(find LeanCert -name '*.lean' -print0 | xargs -0 grep -nE '\bmkSorry\b|\bsorryAx\b|\badmit\b' || true)"
          if [ -n "$hits" ]; then
            echo "Found forbidden synthetic proof-hole construction(s):"
            echo "$hits"
            exit 1
          fi

      - name: Audit - native/runtime boundary markers
        run: |
          echo "implemented_by uses:"
          find LeanCert -name '*.lean' -print0 | xargs -0 grep -nE '\bimplemented_by\b' || true
          echo "unsafe evalExpr uses:"
          find LeanCert/Tactic LeanCert/Meta -name '*.lean' -print0 | xargs -0 grep -nE '\bunsafe[[:space:]]+evalExpr\b|\bevalExpr\b' || true
          echo "pretty-printer string matching candidates:"
          find LeanCert/Tactic LeanCert/Meta -name '*.lean' -print0 | xargs -0 grep -nE 'ppExpr|endsWith "inst' || true

      - name: Build axiom audit imports
        run: |
          lake build LeanCert LeanCert.Validity LeanCert.Validity.AffineBounds \
            LeanCert.Validity.IntegrationDyadic LeanCert.Validity.Monotonicity \
            LeanCert.Validity.CertificateIntegration \
            LeanCert.Engine.Eval LeanCert.Engine.Pisano LeanCert.Engine.PentagonLucas \
            LeanCert.Engine.TaylorModel.Log1p LeanCert.Engine.TaylorModel.TrigReduced \
            LeanCert.Core.HermiteBounds LeanCert.Core.LogBounds

      - name: Guard - core axiom/sorry audit
        run: lake env lean Tests/AxiomAudit.lean

      - name: Guard - integration-cluster axiom audit
        run: lake env lean Tests/AxiomAuditIntegration.lean
